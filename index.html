<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    <title>Holoboard – Innovationsprofessur Lehre</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:red;padding:2rem;font-size:14px;white-space:pre-wrap;">' +
          'MESSAGE: ' + msg + '\nFILE: ' + src + '\nLINE: ' + line + ' COL: ' + col +
          '\nSTACK:\n' + (err && err.stack ? err.stack : 'no stack') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<pre style="color:red;padding:2rem;font-size:14px;white-space:pre-wrap;">' +
          'PROMISE ERROR:\n' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
